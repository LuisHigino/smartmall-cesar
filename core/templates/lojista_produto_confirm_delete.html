{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remover Produto - SmartMall</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #dc3545;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            margin-bottom: 10px;
        }
        .product-name {
            font-weight: bold;
            color: #333;
            font-size: 18px;
        }
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
        }
        button, .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-danger:hover {
            background: #c82333;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Atenção!</h1>
        <p>Tem certeza que deseja remover o produto:</p>
        <p class="product-name">{{ produto.nome }}</p>
        <p style="font-size: 12px; color: #999;">Esta ação não pode ser desfeita.</p>
        
        <form method="post" class="buttons">
            {% csrf_token %}
            <button type="submit" class="btn-danger">Sim, Remover</button>
            <a href="{% url 'lojista_dashboard' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>
</html>
