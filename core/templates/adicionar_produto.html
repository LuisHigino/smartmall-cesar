{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Gerenciamento - Catálogo</title>
  <link rel="stylesheet" href="{%static 'core/css/adicionar_produto.css' %}">
</head>

<body>
  <h1>Adicionar Produto</h1>
  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Cadastrar Produto</button>
    <a href={% url 'painel_catalogo' %}>Cancelar</a>
  </form>
</body>
</html>
