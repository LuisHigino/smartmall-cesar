<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Shopping Virtual</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h1 class="text-center mb-4">🛍️ Shopping Virtual</h1>

    <!-- Categorias -->
    <div class="mb-4 text-center">
        
        <!-- Botão Todas -->
        <a href="?" 
           class="btn {% if not request.GET.categoria %}btn-dark{% else %}btn-secondary{% endif %} m-1">
            Todas
        </a>

        <!-- Botões das categorias -->
        {% for categoria in categorias %}
            <a href="?categoria={{ categoria.id }}" 
               class="btn {% if request.GET.categoria == categoria.id|stringformat:'s' %}btn-dark{% else %}btn-primary{% endif %} m-1">
                {{ categoria.nome }}
            </a>
        {% endfor %}
    </div>

    <!-- Lojas -->
    <div class="row">
        {% for loja in lojas %}
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-body text-center">
                        <h5 class="card-title">{{ loja.nome }}</h5>
                        <p class="card-text text-muted">
                            Categoria: {{ loja.categoria.nome }}
                        </p>
                    </div>
                </div>
            </div>
        {% empty %}
            <p class="text-center">Nenhuma loja encontrada</p>
        {% endfor %}
    </div>

</div>

</body>
</html>
